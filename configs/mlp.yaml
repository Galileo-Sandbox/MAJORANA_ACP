# Reference experiment: MLP baseline for psd_label_low_avse.
# Demonstrates the one-line model swap — only model.{name,params} differs
# from configs/simple_cnn.yaml.
name: mlp_baseline

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: all
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  train_portion: 0.1
  subset_portion: 1.0
  subset_seed: 0
  align_t90: true
  t90_pre: 200
  t90_post: 2000
  energy_range: [500, 3000]
  sampler_strategies: [class_balanced, energy_balanced]
  energy_bin_width_kev: 10

model:
  name: mlp
  params:
    input_dim: 2200
    hidden_dims: [256, 128, 64]
    dropout: 0.3

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: weighted_bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 50
  seed: 0
  out_dir: runs/mlp_baseline
  log_every_n_steps: 50
  device: auto
  amp: true
