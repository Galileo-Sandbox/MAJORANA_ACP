# Cut-acceptance run on simple_cnn_small (5% subset). target_class=1.
name: simple_cnn_small_signal

predictions_path: runs/small_data_configs/simple_cnn_small/eval/predictions.h5
out_dir: results/cut_acceptance/small_data_configs/simple_cnn_small/signal

target_class: 1
energy_range: [500.0, 3000.0]

peak_windows:
  - {lo: 2605.0, hi: 2620.0}
  - {lo: 2095.0, hi: 2110.0}
  - {lo: 1615.0, hi: 1625.0}
  - {lo: 1587.0, hi: 1597.0}

peak_split: {lf: 0.10, hf_train: 0.30, hf_holdout: 0.60}
partition_seed: 0

threshold_range: [0.0, 1.0]
n_per_trial_lf: 128
n_per_trial_hf: 32
min_pool_size: 8

energy_grid_step: 10.0
threshold_grid_step: 0.02

encoder:
  type: mlp
  latent_dim: 64
  hidden_dims: [128, 128]
  dropout: 0.0

cnp:
  n_context_min: 16
  n_context_max: 64
  output_activation: sigmoid
  mixup_alpha: 0.1

training:
  n_steps: 1500
  learning_rate: 1.0e-3
  batch_size: 16
  n_events_per_trial: 128
  n_mc_samples: 4
  grad_clip: 1.0
  eval_every: 0
  eval_batch_size: 32
  eval_n_events: 256
  seed: 0

mfgp:
  kernel: rbf
  n_fidelities: 3
