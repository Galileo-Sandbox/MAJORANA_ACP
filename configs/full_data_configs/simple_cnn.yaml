# Reference experiment: SimpleCNN baseline for psd_label_low_avse.
# Run from project root:
#   python -m majorana_acp.cli.train configs/simple_cnn.yaml
name: simple_cnn_baseline

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: all
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  train_portion: 0.1
  subset_portion: 1.0
  subset_seed: 0
  align_t90: true
  t90_pre: 200
  t90_post: 2000
  energy_range: [500, 3000]
  sampler_strategies: [class_balanced, energy_balanced]
  energy_bin_width_kev: 10

model:
  name: simple_cnn
  params:
    channels: [16, 32, 64]
    kernel_size: 5
    dropout: 0.2
    norm: group
    num_groups: 8

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 50
  seed: 0
  out_dir: runs/full_data_configs/simple_cnn_baseline
  log_every_n_steps: 50
  device: auto
  amp: true
