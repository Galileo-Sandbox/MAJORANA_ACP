# MLP with the first-difference of the waveform stacked as a second
# input channel. Based on mlp_v2.yaml (smaller, better MLP) with
# input_dim doubled from 2200 to 4400 because the dataset now returns
# (2, 2200) which the MLP flattens to (4400,).
name: mlp_derivative

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: all
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  train_portion: 0.1
  subset_portion: 1.0
  subset_seed: 0
  align_t90: true
  t90_pre: 200
  t90_post: 2000
  use_derivative_channel: true
  energy_range: [500, 3000]
  sampler_strategies: [class_balanced, energy_balanced]
  energy_bin_width_kev: 10

model:
  name: mlp
  params:
    input_dim: 4400         # 2 channels x 2200 samples
    hidden_dims: [32, 16]
    dropout: 0.2

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: weighted_bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 10
  seed: 0
  out_dir: runs/full_data_configs/mlp_derivative
  log_every_n_steps: 50
  device: auto
  amp: true
