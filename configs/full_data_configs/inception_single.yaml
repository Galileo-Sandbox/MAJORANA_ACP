# InceptionTime, single-channel input (no derivative). Same data
# preprocessing as configs/inception.yaml.
name: inception_single

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: all
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  train_portion: 0.1
  subset_portion: 1.0
  subset_seed: 0
  align_t90: true
  t90_pre: 200
  t90_post: 2000
  use_derivative_channel: false
  energy_range: [500, 3000]
  sampler_strategies: [class_balanced, energy_balanced]
  energy_bin_width_kev: 10

model:
  name: inception_time
  params:
    in_channels: 1
    # Halved from the paper's defaults (32 -> 16) so the model is ~235k
    # params instead of ~400k, more appropriate for our ~38k events/epoch
    # training budget.
    n_filters: 16
    bottleneck_channels: 16
    # Odd, wider-span kernels: 9 catches fine rising-edge structure,
    # 99 extends the receptive field across the decay tail (~1 us of
    # physical time at 10 ns/sample). Odd kernels also avoid PyTorch's
    # asymmetric-padding warning with padding='same'.
    kernel_sizes: [9, 39, 99]
    n_blocks: 2
    modules_per_block: 3
    use_bottleneck: true
    dropout: 0.2

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: weighted_bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 50
  seed: 0
  out_dir: runs/inception_single
  log_every_n_steps: 50
  device: auto
  amp: true
