# ResNet-1D with the derivative channel enabled (in_channels=2).
# Use this as the primary ResNet config; configs/resnet_single.yaml
# differs only in use_derivative_channel and in_channels.
name: resnet

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: all
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  train_portion: 0.1
  align_t90: true
  t90_pre: 200
  t90_post: 2000
  use_derivative_channel: true
  energy_range: [500, 3000]
  sampler_strategies: [class_balanced, energy_balanced]
  energy_bin_width_kev: 10

model:
  name: resnet1d
  params:
    in_channels: 2
    base_channels: 16
    blocks_per_stage: [2, 2, 2, 2]
    kernel_size: 3
    dropout: 0.2

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: weighted_bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 10
  seed: 0
  out_dir: runs/resnet
  log_every_n_steps: 50
  device: auto
  amp: true
