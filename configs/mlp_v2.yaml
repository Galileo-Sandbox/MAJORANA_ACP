# MLP v2: smaller (~120k params vs ~1M for mlp_baseline) and uses the
# Kaiming/Xavier init that ships with the MLP class. Targets the
# overfitting we saw in mlp_baseline: train_loss kept dropping while
# test_loss spiraled.
name: mlp_v2

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: all
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  train_portion: 0.1

model:
  name: mlp
  params:
    input_dim: 3800
    hidden_dims: [32, 16]
    dropout: 0.2

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: weighted_bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 10
  seed: 0
  out_dir: runs/mlp_v2
  log_every_n_steps: 50
  device: auto
  amp: true
