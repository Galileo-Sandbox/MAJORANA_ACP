# One-file, one-epoch smoke test — used to verify the pipeline end-to-end
# on real Majorana data without spending much GPU time.
name: quick_smoke

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: [0]
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  subset_portion: 1.0
  subset_seed: 0
  energy_range: [500, 3000]
  sampler_strategies: [class_balanced, energy_balanced]
  energy_bin_width_kev: 10

model:
  name: simple_cnn
  params:
    channels: [16, 32, 64]
    kernel_size: 5
    dropout: 0.2

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: weighted_bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 1
  seed: 0
  out_dir: runs/smoke_tests/quick_smoke
  log_every_n_steps: 25
  device: auto
  amp: true
