# Fast iteration smoke test for the MLP — same data slice as
# configs/quick_smoke.yaml so the two are directly comparable.
name: quick_smoke_mlp

data:
  data_dir: /home/klz/Data/MAJORANA
  train_file_indices: [0]
  test_file_indices: all
  target_label: psd_label_low_avse
  batch_size: 256
  num_workers: 4
  baseline_samples: 500
  subset_portion: 1.0
  subset_seed: 0
  energy_range: [500, 3000]
  sampler_strategies: [class_balanced, energy_balanced]
  energy_bin_width_kev: 10

model:
  name: mlp
  params:
    input_dim: 3800
    hidden_dims: [256, 128, 64]
    dropout: 0.3

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4

loss:
  type: weighted_bce
  pos_weight: auto
  balanced_sampler: false

train:
  epochs: 1
  seed: 0
  out_dir: runs/smoke_tests/quick_smoke_mlp
  log_every_n_steps: 25
  device: auto
  amp: true
